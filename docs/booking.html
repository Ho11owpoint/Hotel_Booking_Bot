<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0c0f23">
  <title>Birol Hotel — My bookings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500;1,700&display=swap">
  <link rel="stylesheet" href="styles/booking.css">
</head>
<body>
  <main class="page">

    <header class="page-header">
      <a href="index.html" class="back-link" aria-label="Back to home">‹</a>
      <div class="monogram">B</div>
      <div class="page-title">
        <h1>My bookings</h1>
        <p class="muted">Your Birol Hotel reservations</p>
      </div>
    </header>

    <section id="bookingList" class="booking-list"
             aria-live="polite"
             aria-label="List of confirmed bookings">
      <!-- populated by booking.js -->
    </section>

    <div class="footer-actions">
      <a href="chat.html" class="btn-primary">Make a new booking</a>
      <a href="index.html" class="btn-ghost">Back to home</a>
    </div>

  </main>

  <script src="js/bot.js"></script>
  <script src="js/booking.js"></script>
</body>
</html>
