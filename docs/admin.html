<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0c0f23">
  <title>Birol Hotel — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500;1,700&display=swap">
  <link rel="stylesheet" href="styles/admin.css">
</head>
<body>
  <main class="page">

    <!-- Header -->
    <header class="page-header">
      <a href="index.html" class="back-link" aria-label="Back to home">‹</a>
      <div class="monogram">B</div>
      <div class="page-title">
        <h1>CEO Dashboard</h1>
        <p class="muted">Birol Hotel · staff area</p>
      </div>
      <button id="logoutBtn" class="logout hidden" type="button">Sign out</button>
    </header>

    <!-- Password gate -->
    <section id="gate" class="gate" aria-live="polite">
      <div class="lock-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="26" height="26">
          <path fill="currentColor"
                d="M12 2a5 5 0 0 0-5 5v3H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2h-1V7a5 5 0 0 0-5-5Zm-3 8V7a3 3 0 1 1 6 0v3H9Zm3 4.25a1.75 1.75 0 1 1 0 3.5 1.75 1.75 0 0 1 0-3.5Z"/>
        </svg>
      </div>
      <h2>Staff access</h2>
      <p class="gate-sub">Enter the password to view the CEO dashboard.</p>
      <form id="gateForm" class="gate-form">
        <input id="pwInput" class="pw-input"
               type="password" autocomplete="current-password"
               placeholder="Password" required autofocus>
        <button type="submit" class="pw-submit">Sign in</button>
      </form>
      <p id="gateError" class="gate-error" role="alert"></p>
      <p class="gate-hint">Restricted to Birol Hotel staff.</p>
    </section>

    <!-- Dashboard (shown after successful login) -->
    <section id="dashboard" class="dashboard hidden">

      <!-- Stats -->
      <div class="stats">
        <div class="stat">
          <span class="stat-label">Total bookings</span>
          <span class="stat-value" id="statTotal">–</span>
        </div>
        <div class="stat">
          <span class="stat-label">Guests hosted</span>
          <span class="stat-value" id="statGuests">–</span>
        </div>
        <div class="stat">
          <span class="stat-label">Room-nights</span>
          <span class="stat-value" id="statNights">–</span>
        </div>
      </div>

      <!-- Occupancy calendar -->
      <section class="panel">
        <header class="panel-head">
          <h3>Occupancy calendar</h3>
          <div class="legend">
            <span><i class="sw sw-guest"></i>Guest booking</span>
            <span><i class="sw sw-peak"></i>Peak · no rooms</span>
            <span><i class="sw sw-free"></i>Available</span>
          </div>
        </header>
        <div id="calendar" class="calendar" aria-label="Occupancy calendar"></div>
      </section>

      <!-- Bookings list -->
      <section class="panel">
        <header class="panel-head">
          <h3>All bookings</h3>
          <span class="muted small" id="bookingsCount"></span>
        </header>
        <div id="bookingsList" class="bookings-list"></div>
      </section>

    </section>

  </main>

  <script src="js/bot.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
