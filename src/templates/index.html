<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Birol Hotel — Booking Assistant</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <!-- Iridescent background aurora -->
  <div class="aurora" aria-hidden="true">
    <span class="blob b1"></span>
    <span class="blob b2"></span>
    <span class="blob b3"></span>
    <span class="blob b4"></span>
  </div>

  <main class="chat-shell">
    <header class="chat-header">
      <a href="{{ url_for('landing') }}"
         class="home-link"
         title="Back to home"
         aria-label="Back to home">‹</a>
      <div class="logo">
        <span class="logo-mark">B</span>
      </div>
      <div class="header-text">
        <h1>Birol Hotel</h1>
        <p class="tagline">Booking assistant · Aria</p>
      </div>
      <button id="resetBtn" class="reset-btn" title="Start over">Restart</button>
    </header>

    <section id="messages" class="messages" aria-live="polite">
      <div class="msg bot">
        <div class="bubble">{{ greeting }}</div>
      </div>
    </section>

    <!-- Inline calendar — shown when the bot enters the 'dates' slot -->
    <section id="calendarSlot"
             class="calendar-slot"
             aria-hidden="true"
             aria-label="Select check-in and check-out"></section>

    <form id="chatForm" class="composer" autocomplete="off">
      <input
        id="input"
        name="message"
        type="text"
        placeholder="Type your message… (try &ldquo;book a room&rdquo;)"
        autofocus
        required>
      <button type="submit" aria-label="Send">Send</button>
    </form>

    <footer class="chat-footer">
      <small>Prototype · IU Project: AI Use Case (CSEMAIPAIUC01)</small>
    </footer>
  </main>

  <script src="{{ url_for('static', filename='chat.js') }}"></script>
</body>
</html>
